<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Asistencia Novapet</title>
  <style>
    :root {
      --page: #f6f8f8;
      --panel: #ffffff;
      --panel-soft: #f9fbfb;
      --ink: #17272b;
      --muted: #61737a;
      --line: #d9e2e2;
      --line-strong: #bfcfcf;
      --teal: #0f8b8d;
      --teal-dark: #0a5f61;
      --green: #26734d;
      --red: #b94038;
      --amber: #a96f15;
      --blue: #2f5f9f;
      --violet: #6d57a4;
      --gray: #667085;
      --soft-red: #fff0ee;
      --soft-green: #edf8f2;
      --soft-amber: #fff7e2;
      --shadow: 0 10px 26px rgba(31, 45, 49, 0.07);
      --shadow-soft: 0 5px 14px rgba(31, 45, 49, 0.05);
    }

    * { box-sizing: border-box; }
    html {
      background: var(--page);
      color: var(--ink);
    }
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, Helvetica, sans-serif;
      font-size: 13px;
      line-height: 1.35;
      letter-spacing: 0;
      color: var(--ink);
    }
    button, input, select {
      font: inherit;
    }
    button, input, select {
      transition: border-color 160ms ease, box-shadow 160ms ease, background 160ms ease, color 160ms ease, transform 160ms ease;
    }
    button:focus-visible, input:focus-visible, select:focus-visible {
      outline: 3px solid rgba(15, 139, 141, 0.18);
      outline-offset: 2px;
    }
    .shell {
      width: 100%;
      max-width: none;
      margin: 0;
      padding: 8px 10px 16px;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 8px 10px;
      margin-bottom: 6px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      box-shadow: none;
    }
    .title {
      border-left: 3px solid var(--teal);
      padding-left: 10px;
    }
    .title h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.1;
      letter-spacing: 0;
    }
    .title p {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 12px;
    }
    .actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .btn {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      border-radius: 8px;
      padding: 6px 11px;
      cursor: pointer;
      min-height: 34px;
      font-weight: 650;
      font-size: 13px;
      box-shadow: 0 1px 0 rgba(23, 39, 43, 0.04);
      white-space: nowrap;
      min-width: max-content;
    }
    .btn:hover {
      border-color: var(--line-strong);
      background: var(--panel-soft);
      transform: translateY(-1px);
    }
    .btn.primary {
      border-color: var(--teal);
      background: var(--teal);
      color: #fff;
    }
    .btn.primary:hover {
      border-color: var(--teal-dark);
      background: var(--teal-dark);
    }
    .month-tabs {
      display: flex;
      gap: 2px;
      overflow-x: auto;
      padding: 3px 4px;
      margin-bottom: 6px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      box-shadow: none;
    }
    .month-tab {
      border: 1px solid transparent;
      background: transparent;
      color: var(--ink);
      border-radius: 6px;
      padding: 5px 10px;
      white-space: nowrap;
      cursor: pointer;
      font-weight: 700;
      font-size: 13px;
      text-align: left;
    }
    .month-tab small {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 10px;
      font-weight: 700;
    }
    .month-tab:hover {
      background: #eef5f4;
      color: var(--teal-dark);
    }
    .month-tab[aria-selected="true"] {
      background: var(--ink);
      color: #fff;
      border-color: var(--ink);
      box-shadow: none;
    }
    .month-tab[aria-selected="true"] small {
      color: rgba(255, 255, 255, 0.78);
    }
    .kpis {
      display: grid;
      grid-template-columns: repeat(6, minmax(140px, 1fr));
      gap: 0;
      margin-bottom: 6px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      overflow: hidden;
    }
    .kpi {
      position: relative;
      background: transparent;
      border: 0;
      border-right: 1px solid var(--line);
      border-radius: 0;
      padding: 8px 11px 7px;
      min-height: 58px;
      box-shadow: none;
      overflow: hidden;
    }
    .kpi:last-child {
      border-right: 0;
    }
    .kpi::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 3px;
      background: var(--teal);
    }
    .kpi-attendance::before { background: var(--green); }
    .kpi-people::before { background: var(--blue); }
    .kpi-absences::before { background: var(--red); }
    .kpi-vacation::before { background: var(--violet); }
    .kpi-incidents::before { background: var(--amber); }
    .kpi-month::before { background: var(--ink); }
    .kpi:hover {
      background: #fbfdfd;
      transform: translateY(-1px);
    }
    .kpi span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0;
      font-weight: 750;
    }
    .kpi strong {
      display: block;
      margin-top: 4px;
      font-size: 19px;
      line-height: 1.15;
      font-variant-numeric: tabular-nums;
    }
    .kpi small {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 11px;
    }
    .toolbar {
      display: grid;
      grid-template-columns: 1fr 170px 150px;
      gap: 8px;
      margin: 0;
      padding: 8px 12px;
      border: 0;
      border-bottom: 1px solid var(--line);
      border-radius: 0;
      background: #fff;
      box-shadow: none;
    }
    .field {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      min-height: 34px;
      padding: 6px 9px;
      width: 100%;
      color: var(--ink);
      min-width: 0;
      font-size: 13px;
    }
    .field:hover {
      border-color: var(--line-strong);
    }
    .field:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(15, 139, 141, 0.12);
      outline: 0;
    }
    .editor-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 6px;
      margin: 0 0 6px;
      align-items: start;
    }
    .editor-panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      box-shadow: none;
      padding: 8px 10px;
      min-width: 0;
    }
    .editor-panel.month-panel {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: auto minmax(260px, 380px);
      align-items: center;
      gap: 12px;
      padding: 6px 8px;
    }
    .editor-panel.month-panel .editor-head {
      margin: 0;
    }
    .calendar-editor {
      padding: 8px 12px;
      border-bottom: 1px solid var(--line);
      background: #fbfefe;
    }
    .calendar-editor .editor-head {
      margin-bottom: 6px;
    }
    .calendar-editor .editor-row {
      grid-template-columns: minmax(200px, 1.5fr) minmax(96px, 0.55fr) minmax(138px, 0.8fr) minmax(78px, auto);
    }
    .editor-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 7px;
    }
    .editor-head h2 {
      margin: 0;
      font-size: 12px;
      line-height: 1.2;
    }
    .editor-head span {
      display: inline-flex;
      align-items: center;
      min-height: 19px;
      padding: 1px 7px;
      border-radius: 999px;
      background: var(--soft-green);
      color: var(--green);
      font-size: 10px;
      font-weight: 800;
    }
    .editor-head span.pending {
      background: var(--soft-amber);
      color: var(--amber);
    }
    .editor-row {
      display: grid;
      grid-template-columns: minmax(180px, 1.2fr) minmax(90px, 0.55fr) minmax(126px, 0.7fr) minmax(78px, auto);
      gap: 8px;
      min-width: 0;
    }
    .month-editor {
      grid-template-columns: minmax(180px, 1fr) minmax(110px, auto);
    }
    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 340px;
      gap: 10px;
      align-items: start;
    }
    .section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      margin-bottom: 12px;
      overflow: hidden;
    }
    .section:hover {
      border-color: var(--line-strong);
    }
    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, #ffffff 0, #f8fbfa 100%);
    }
    .section-head h2 {
      margin: 0;
      font-size: 14px;
      line-height: 1.2;
    }
    .section-head p {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 11px;
    }
    .table-wrap {
      overflow: auto;
      max-height: 640px;
      scrollbar-color: #b8c8c8 #eef4f3;
    }
    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      min-width: 780px;
      font-size: 12px;
    }
    th, td {
      padding: 7px 9px;
      border-bottom: 1px solid var(--line);
      vertical-align: middle;
      text-align: left;
      white-space: nowrap;
    }
    th {
      background: #edf4f3;
      color: #334047;
      position: sticky;
      top: 0;
      z-index: 2;
      font-weight: 700;
      border-bottom-color: var(--line-strong);
    }
    tbody tr:nth-child(even) td {
      background: #fbfdfd;
    }
    tbody tr:hover td {
      background: #eef8f7;
    }
    tbody tr.row-low td {
      background: #fff8f6;
    }
    tbody tr.row-low:hover td {
      background: #fff0ec;
    }
    .sticky-name {
      position: sticky;
      left: 0;
      z-index: 1;
      background: var(--panel);
      min-width: 190px;
      max-width: 230px;
      box-shadow: 1px 0 0 var(--line);
    }
    th.sticky-name {
      z-index: 3;
      background: #edf4f3;
    }
    .person-cell {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .avatar {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 26px;
      height: 26px;
      border-radius: 7px;
      background: #e3f2f1;
      color: var(--teal-dark);
      font-size: 11px;
      font-weight: 800;
      flex: 0 0 auto;
    }
    .person-name {
      display: block;
      font-weight: 800;
    }
    .role-badge {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 2px 7px;
      border: 1px solid #d7e3e3;
      border-radius: 999px;
      background: #f4f8f8;
      color: #415158;
      font-size: 11px;
      font-weight: 700;
    }
    .role {
      color: var(--muted);
      font-size: 11px;
      display: block;
      margin-top: 2px;
    }
    .num {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }
    .rate {
      display: inline-flex;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
      min-width: 92px;
      font-variant-numeric: tabular-nums;
      font-weight: 750;
    }
    .meter {
      width: 46px;
      height: 6px;
      background: #e4eaed;
      border-radius: 999px;
      overflow: hidden;
    }
    .meter i {
      display: block;
      height: 100%;
      background: var(--teal);
    }
    .low .meter i { background: var(--red); }
    .count-pill {
      display: inline-flex;
      justify-content: center;
      min-width: 24px;
      padding: 1px 7px;
      border-radius: 999px;
      background: #f1f5f5;
      font-weight: 750;
      font-variant-numeric: tabular-nums;
    }
    .count-pill.good { color: var(--green); background: var(--soft-green); }
    .count-pill.bad { color: var(--red); background: var(--soft-red); }
    .count-pill.vacation { color: var(--blue); background: #eef5ff; }
    .count-pill.medical { color: var(--violet); background: #f3efff; }
    .count-pill.permission { color: var(--amber); background: var(--soft-amber); }
    .status {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 22px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 700;
      border: 1px solid transparent;
      cursor: pointer;
      padding: 0;
      font-family: inherit;
    }
    .status:hover {
      transform: translateY(-1px);
      box-shadow: 0 5px 12px rgba(23, 39, 43, 0.12);
    }
    .status.selected {
      outline: 2px solid var(--teal);
      outline-offset: 2px;
      box-shadow: 0 0 0 4px rgba(15, 139, 141, 0.12);
    }
    .status.present { color: var(--green); background: var(--soft-green); border-color: #c7ead5; }
    .status.late { color: var(--amber); background: var(--soft-amber); border-color: #ffd88e; }
    .status.absent { color: var(--red); background: var(--soft-red); border-color: #ffd0cb; }
    .status.vacation { color: var(--blue); background: #eef5ff; border-color: #cbddff; }
    .status.medical { color: var(--violet); background: #f3efff; border-color: #ddd2ff; }
    .status.permission { color: var(--amber); background: var(--soft-amber); border-color: #ffe0a6; }
    .status.holiday { color: #52606d; background: #eef1f3; border-color: #d7dee2; }
    .status.out { color: #555; background: #f0f0f0; border-color: #d7d7d7; width: auto; padding: 0 6px; }
    .status.other { color: #4b5563; background: #f3f4f6; border-color: #d1d5db; width: auto; padding: 0 6px; }
    .status.empty {
      color: transparent;
      background: #f9fbfb;
      border-color: #edf0f2;
    }
    .legend {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      padding: 8px 12px 10px;
      border-top: 1px solid var(--line);
      background: #fbfdfd;
    }
    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      color: var(--muted);
      font-size: 11px;
    }
    .side {
      display: grid;
      gap: 12px;
      position: sticky;
      top: 10px;
    }
    .bars {
      padding: 10px 12px 12px;
      display: grid;
      gap: 8px;
    }
    .bar-row {
      display: grid;
      grid-template-columns: 64px 1fr 50px;
      gap: 8px;
      align-items: center;
      font-size: 12px;
      padding: 5px 0;
    }
    .bar-row strong {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .bar-row.is-active strong {
      color: var(--teal-dark);
    }
    .bar-row.is-active .bar-track {
      outline: 2px solid rgba(15, 139, 141, 0.16);
    }
    .bar-track {
      height: 8px;
      background: #e8eef1;
      border-radius: 999px;
      overflow: hidden;
    }
    .bar-track i {
      display: block;
      height: 100%;
      background: var(--teal);
    }
    .alerts, .comments {
      padding: 8px 0;
    }
    .comments {
      max-height: 460px;
      overflow: auto;
      scrollbar-color: #b8c8c8 #eef4f3;
    }
    .comments-body[hidden] {
      display: none;
    }
    .comment-tools {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(128px, 0.8fr);
      gap: 8px;
      padding: 8px 12px;
      border-bottom: 1px solid var(--line);
      background: #fbfdfd;
    }
    .comment-compose {
      display: grid;
      gap: 8px;
      padding: 8px 12px;
      border-bottom: 1px solid var(--line);
      background: #fff;
    }
    .comment-compose.is-linked {
      background: #f2fbfa;
      box-shadow: inset 3px 0 0 var(--teal);
    }
    .comment-compose .field {
      min-height: 32px;
      padding: 6px 9px;
      font-size: 12px;
    }
    .comment-compose .btn {
      width: 100%;
      justify-content: center;
    }
    .comment-compose-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 8px;
    }
    .comment-hint {
      display: flex;
      align-items: center;
      gap: 6px;
      min-height: 28px;
      padding: 5px 8px;
      border: 1px solid #c8e9e7;
      border-radius: 7px;
      background: #ecf9f7;
      color: var(--teal-dark);
      font-size: 11px;
      font-weight: 750;
    }
    .comment-tools .field {
      min-height: 32px;
      padding: 6px 9px;
      font-size: 12px;
    }
    .comment-summary {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
      padding: 8px 12px;
      border-bottom: 1px solid var(--line);
      background: #fff;
    }
    .comment-stat {
      display: grid;
      gap: 2px;
      padding: 6px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f8fbfb;
      min-width: 0;
    }
    .comment-stat strong {
      font-size: 14px;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .comment-stat span {
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .alert-item, .comment-item {
      padding: 9px 12px;
      border-bottom: 1px solid var(--line);
    }
    .alert-item {
      display: grid;
      gap: 4px;
      border-left: 4px solid transparent;
    }
    .alert-item.high {
      border-left-color: var(--red);
      background: #fff8f6;
    }
    .alert-item.watch {
      border-left-color: var(--amber);
      background: #fffaf0;
    }
    .alert-item:last-child, .comment-item:last-child {
      border-bottom: 0;
    }
    .alert-item strong, .comment-item strong {
      display: block;
      font-size: 12px;
    }
    .comment-item {
      display: grid;
      gap: 7px;
      border-left: 4px solid transparent;
      background: #fff;
    }
    .comment-item:hover {
      background: #f8fbfb;
    }
    .comment-item.absence {
      border-left-color: var(--red);
    }
    .comment-item.late {
      border-left-color: var(--amber);
    }
    .comment-item.permission {
      border-left-color: var(--blue);
    }
    .comment-item.medical {
      border-left-color: var(--violet);
    }
    .comment-item.vacation {
      border-left-color: var(--blue);
    }
    .comment-item.holiday {
      border-left-color: #667085;
    }
    .comment-item.other-note {
      border-left-color: var(--line-strong);
    }
    .comment-top {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .comment-person {
      display: grid;
      gap: 3px;
      min-width: 0;
    }
    .comment-person strong {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .comment-meta {
      display: flex;
      align-items: center;
      gap: 5px;
      flex-wrap: wrap;
    }
    .date-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 19px;
      padding: 1px 6px;
      border-radius: 999px;
      background: #eef4f3;
      color: #415158;
      font-size: 11px;
      font-weight: 750;
      white-space: nowrap;
    }
    .comment-badges {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      flex: 0 0 auto;
    }
    .type-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 19px;
      padding: 1px 6px;
      border-radius: 999px;
      background: #edf6f5;
      color: var(--teal-dark);
      font-size: 11px;
      font-weight: 750;
      white-space: nowrap;
    }
    .alert-item span, .comment-item span {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 11px;
    }
    .comment-detail {
      color: #334047;
      font-size: 11px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }
    .comment-item .date-chip {
      display: inline-flex;
      margin-top: 0;
      color: #415158;
      font-size: 11px;
    }
    .comment-delete {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      border: 1px solid #ffd0cb;
      background: #fffafa;
      color: var(--red);
      border-radius: 999px;
      min-width: 0;
      height: 22px;
      padding: 0 8px;
      cursor: pointer;
      font-size: 10px;
      font-weight: 750;
      line-height: 1;
      font-family: inherit;
    }
    .comment-delete::before {
      content: "Eliminar";
    }
    .comment-delete::after {
      content: "×";
      font-size: 13px;

    .layout {

    /* Rediseño v3: mes nuevo fuera de la columna lateral. */
    .shell {
      display: block;
      min-height: 100vh;
      padding: 10px;
    }
    .topbar {
      display: grid;

  <main class="shell">
    <header class="topbar">

            <input class="field" id="newMonth" type="month">

          </div>
        </div>
      </section>
      <div class="actions">
        <button class="btn" id="resetFilters" type="button">Limpiar filtros</button>

    <nav class="month-tabs" id="monthTabs" aria-label="Meses"></nav>

    <div class="layout">

        <section class="section">
          <div class="section-head">
            <div>

              <p id="dailySubtitle"></p>

  <script>
    const BASE_REPORT = JSON.parse(document.getElementById("attendance-data").textContent);
    const STORAGE_KEY = "novapet-asistencia-html-v3";
    let report = (() => {
      try {
        const stored = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
        return stored && Array.isArray(stored.months) ? stored : structuredClone(BASE_REPORT);
      } catch {
        return structuredClone(BASE_REPORT);
      }
    })();
    const state = {
      monthIndex: Math.max(0, report.months.length - 1),
      query: "",
      status: "all",
      rate: "all",
      commentQuery: "",
      commentPerson: "all",
      commentStatusCode: "",
      commentDraftEmployeeIndex: null,
      commentDraftDateIso: "",
      selectedEmployeeIndex: null,
      selectedDayIndex: null,
      commentsCollapsed: false,
      workersCollapsed: false,
    };

    const moneyless = new Intl.NumberFormat("es-CL", { maximumFractionDigits: 0 });
    const dateFmt = new Intl.DateTimeFormat("es-CL", { day: "2-digit", month: "2-digit", year: "numeric" });
    const $ = (id) => document.getElementById(id);
    const STATUS_META = {
      EMPTY: { raw: "", label: "", className: "empty" },
      X: { raw: "X", label: "Asiste", className: "present" },
      T: { raw: "T", label: "Asiste atrasado", className: "late" },
      A: { raw: "A", label: "Ausente", className: "absent" },
      V: { raw: "V", label: "Vacaciones", className: "vacation" },
      L: { raw: "L", label: "Licencia", className: "medical" },
      P: { raw: "P", label: "Permiso", className: "permission" },
      F: { raw: "F", label: "Feriado", className: "holiday" },
    };
    const STATUS_CYCLE = ["EMPTY", "X", "T", "A", "V", "L", "P", "F"];
    const MONTH_NAMES = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
    const WEEKDAY_LETTERS = ["D", "L", "M", "M", "J", "V", "S"];
    const CUTOFF_DAY = 25;

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[char]));
    }

    function percent(value) {
      if (value === null || value === undefined || Number.isNaN(Number(value))) return "Sin dato";
      const n = Number(value) * 100;
      return n === 100 ? "100%" : n.toFixed(1).replace(".", ",") + "%";
    }

    function formatDate(raw, iso) {
      if (iso) return dateFmt.format(new Date(iso + "T12:00:00"));
      return raw || "Sin fecha";
    }

    function initials(name) {
      return String(name || "")
        .trim()
        .split(/\s+/)
        .slice(0, 2)
        .map((part) => part.charAt(0))
        .join("")
        .toLocaleUpperCase("es-CL") || "?";
    }

    function weekendClass(day) {
      return ["S", "D"].includes(String(day.weekday || "").trim().toLocaleUpperCase("es-CL")) ? " weekend" : "";
    }

    function countPill(value, className) {
      return '<span class="count-pill ' + className + '">' + moneyless.format(value || 0) + '</span>';
    }

    function normalizeText(value) {
      return String(value || "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .toLocaleUpperCase("es-CL");
    }

    function commentKind(comment) {
      const statusCode = String(comment.statusCode || "").toLocaleUpperCase("es-CL");
      if (statusCode === "A") return "absence";
      if (statusCode === "T") return "late";
      if (statusCode === "P") return "permission";
      if (statusCode === "L") return "medical";
      if (statusCode === "V") return "vacation";
      if (statusCode === "F") return "holiday";
      const text = normalizeText((comment.person || "") + " " + (comment.detail || ""));
      if (text.includes("FALTO") || text.includes("FALTA") || text.includes("NO VINO") || text.includes("SIN JUSTIFICANTE")) return "absence";
      if (text.includes("TARDE") || text.includes("RETRASO") || text.includes("LLEGA") || text.includes("LLEGO") || text.includes("ENTRA A TRABAJAR")) return "late";
      if (text.includes("PERMISO") || text.includes("RETIRA")) return "permission";
      return "other-note";
    }

    function commentKindLabel(comment) {
      return {
        absence: "Falta/Ausencia",
        late: "Atraso",
        permission: "Permiso/Retiro",
        medical: "Licencia",
        vacation: "Vacaciones",
        holiday: "Feriado",
        "other-note": "Comentario",
      }[commentKind(comment)] || "Comentario";
    }

    function statusFor(day, code) {
      const cleanCode = STATUS_META[code] ? code : "EMPTY";
      const meta = STATUS_META[cleanCode];
      return {
        day: day.day,
        weekday: day.weekday,
        code: cleanCode,
        raw: meta.raw,
        label: meta.label,
        className: meta.className,
      };
    }

    function recalcEmployee(employee) {
      const counts = employee.statuses.reduce((acc, status) => {
        const code = STATUS_META[status.code] ? status.code : "EMPTY";
        acc[code] = (acc[code] || 0) + 1;
        return acc;
      }, {});
      const absenceDays = (counts.A || 0) + (counts.L || 0);
      const workDays = ["X", "T", "A", "V", "L", "P", "F"].reduce((sum, code) => sum + (counts[code] || 0), 0);
      employee.summary = {
        holidays: counts.F || 0,
        present: (counts.X || 0) + (counts.T || 0),
        absent: counts.A || 0,
        vacation: counts.V || 0,
        medical: counts.L || 0,
        permission: counts.P || 0,
        absenceDays,
        workDays,
        attendanceRate: workDays ? (workDays - absenceDays) / workDays : null,
      };
    }

    function recalcMonth(month) {
      const totals = {
        holidays: 0,
        present: 0,
        absent: 0,
        vacation: 0,
        medical: 0,
        permission: 0,
        absenceDays: 0,
        workDays: 0,
        attendanceRate: null,
      };
      month.employees.forEach((employee) => {
        recalcEmployee(employee);
        for (const key of ["holidays", "present", "absent", "vacation", "medical", "permission", "absenceDays", "workDays"]) {
          totals[key] += employee.summary[key] || 0;
        }
      });
      totals.attendanceRate = totals.workDays ? (totals.workDays - totals.absenceDays) / totals.workDays : null;
      month.totals = totals;
    }

    function persist() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(report));
      const saveState = $("saveState");
      if (!saveState) return;
      saveState.textContent = "Guardado";
      saveState.classList.remove("pending");
    }

    function markSavedSoon() {
      const saveState = $("saveState");
      if (saveState) {
        saveState.textContent = "Guardando";
        saveState.classList.add("pending");
      }
      persist();
    }

    function defaultMonthValue() {
      const current = report.months[state.monthIndex]?.title || "";
      const baseYear = new Date(report.sourceLastModified || Date.now()).getFullYear();
      const currentMonth = MONTH_NAMES.findIndex((name) => current.toLocaleLowerCase("es-CL").startsWith(name.toLocaleLowerCase("es-CL")));
      const next = currentMonth >= 0 ? currentMonth + 1 : new Date().getMonth() + 1;
      const year = baseYear + Math.floor(next / 12);
      const month = (next % 12) + 1;
      return String(year).padStart(4, "0") + "-" + String(month).padStart(2, "0");
    }

    function buildMonthDays(year, monthIndex) {
      const days = [];
      const lastDay = new Date(year, monthIndex + 1, 0).getDate();
      for (let day = 1; day <= lastDay; day += 1) {
        const date = new Date(year, monthIndex, day);
        if (date.getDay() === 0) continue;
        days.push({ day, weekday: WEEKDAY_LETTERS[date.getDay()] });
      }
      return days;
    }

    function baseReportYear() {
      return new Date(report.sourceLastModified || report.generatedAt || Date.now()).getFullYear();
    }

    function inferMonthIndex(month) {
      const text = normalizeText([month.title, month.sheetName, month.id].join(" "));
      return MONTH_NAMES.findIndex((name) => text.includes(normalizeText(name)));
    }

    function inferMonthYear(month) {
      if (Number.isFinite(Number(month.year))) return Number(month.year);
      const text = [month.title, month.sheetName, month.id].join(" ");
      const match = text.match(/\b(19\d{2}|20\d{2})\b/);
      return match ? Number(match[1]) : baseReportYear();
    }

    function normalizeStatusForDay(day, status) {
      if (!status) return statusFor(day, "EMPTY");
      if (STATUS_META[status.code]) return statusFor(day, status.code);
      return {
        day: day.day,
        weekday: day.weekday,
        code: status.code || "OTHER",
        raw: status.raw || status.code || "",
        label: status.label || status.raw || status.code || "",
        className: status.className || "other",
      };
    }

    function normalizeMonthDays(month) {
      const monthIndex = inferMonthIndex(month);
      if (monthIndex < 0) return;
      const oldDays = Array.isArray(month.days) ? month.days : [];
      const days = buildMonthDays(inferMonthYear(month), monthIndex);
      const validDays = new Set(days.map((day) => day.day));
      month.days = days;
      month.employees = (month.employees || []).map((employee) => {
        const statusesByDay = new Map();
        (employee.statuses || []).forEach((status, index) => {
          const dayNumber = Number(status.day ?? oldDays[index]?.day);
          if (validDays.has(dayNumber) && !statusesByDay.has(dayNumber)) statusesByDay.set(dayNumber, status);
        });
        return {
          ...employee,
          statuses: days.map((day) => normalizeStatusForDay(day, statusesByDay.get(day.day))),
        };
      });
    }

    function normalizeReportDays() {
      report.months.forEach(normalizeMonthDays);
    }

    function monthMatches(month, year, monthIndex) {
      return inferMonthYear(month) === year && inferMonthIndex(month) === monthIndex;
    }

    function findMonthByYearMonth(year, monthIndex) {
      return report.months.findIndex((month) => monthMatches(month, year, monthIndex));
    }

    function sourceMonthForNewMonth() {
      return [...report.months].reverse().find((month) => activeEmployees(month).length) || report.months[state.monthIndex] || report.months[0];
    }

    function dateIso(date) {
      return date.getFullYear() + "-" + String(date.getMonth() + 1).padStart(2, "0") + "-" + String(date.getDate()).padStart(2, "0");
    }

    function findMonthIndexByDate(date) {
      const year = date.getFullYear();
      const monthIndex = date.getMonth();
      return report.months.findIndex((month) => inferMonthYear(month) === year && inferMonthIndex(month) === monthIndex);
    }

    function employeeKey(employee) {
      return normalizeText(employee?.name || "");
    }

    function findEmployeeIndex(month, employee) {
      const key = employeeKey(employee);
      return (month.employees || []).findIndex((candidate) => employeeKey(candidate) === key);
    }

    function ensureSourceEmployee(month, employee) {
      let index = findEmployeeIndex(month, employee);
      if (index >= 0) return index;
      month.employees.push({
        role: employee.role || "",
        name: employee.name || "",
        company: employee.company || "",
        statuses: month.days.map((day) => statusFor(day, "EMPTY")),
        summary: {},
      });
      return month.employees.length - 1;
    }

    function createEmptyEmployee(month, name, role) {
      return {
        role: role || "",
        name: name || "",
        company: "",
        statuses: month.days.map((day) => statusFor(day, "EMPTY")),
        summary: {},
      };
    }

    function cleanWorkerText(value) {
      return String(value || "")
        .trim()
        .replace(/\s+/g, " ")
        .toLocaleUpperCase("es-CL");
    }

    function setWorkerMessage(message) {
      const target = $("workerState");
      if (target) target.textContent = message || "";
    }

    function buildCutoffDays(year, monthIndex) {
      const start = new Date(year, monthIndex - 1, CUTOFF_DAY + 1);
      const end = new Date(year, monthIndex, CUTOFF_DAY);
      const days = [];
      for (let date = new Date(start); date <= end; date.setDate(date.getDate() + 1)) {
        if (date.getDay() === 0) continue;
        const sourceMonthIndex = findMonthIndexByDate(date);
        const sourceMonth = report.months[sourceMonthIndex];
        const sourceDayIndex = sourceMonth ? sourceMonth.days.findIndex((day) => day.day === date.getDate()) : -1;
        days.push({
          day: date.getDate(),
          weekday: WEEKDAY_LETTERS[date.getDay()],
          label: String(date.getDate()).padStart(2, "0") + "/" + String(date.getMonth() + 1).padStart(2, "0"),
          dateIso: dateIso(date),
          sourceMonthIndex,
          sourceDayIndex,
        });
      }
      return days;
    }

    function commentsForPeriod(startIso, endIso, selectedMonthIndex) {
      const start = new Date(startIso + "T00:00:00").getTime();
      const end = new Date(endIso + "T23:59:59").getTime();
      return report.months.flatMap((month, monthIndex) => (month.comments || []).map((comment, commentIndex) => ({
        ...comment,
        sourceMonthIndex: monthIndex,
        sourceCommentIndex: commentIndex,
      })).filter((comment) => {
        if (!comment.dateIso) return monthIndex === selectedMonthIndex;
        const value = new Date(comment.dateIso + "T12:00:00").getTime();
        return value >= start && value <= end;
      }));
    }

    function dateInsidePeriod(dateIsoValue, period) {
      if (!dateIsoValue || !period?.periodStartIso || !period?.periodEndIso) return false;
      return dateIsoValue >= period.periodStartIso && dateIsoValue <= period.periodEndIso;
    }

    function defaultCommentDate(period) {
      const today = dateIso(new Date());
      if (dateInsidePeriod(today, period)) return today;
      if (dateInsidePeriod($("commentDate").value, period)) return $("commentDate").value;
      return period?.periodEndIso || new Date(report.sourceLastModified || Date.now()).toISOString().slice(0, 10);
    }

    function sourceMonthForComment(dateIsoValue) {
      if (!dateIsoValue) return report.months[state.monthIndex];
      const date = new Date(dateIsoValue + "T12:00:00");
      const monthIndex = findMonthIndexByDate(date);
      return report.months[monthIndex] || report.months[state.monthIndex];
    }

    function statusNeedsComment(code) {
      return ["A", "T", "V", "L", "P", "F"].includes(String(code || "").toLocaleUpperCase("es-CL"));
    }

    function statusCommentDetail(code) {
      return {
        A: "No asistio",
        T: "Llego atrasado",
        V: "Vacaciones",
        L: "Licencia medica",
        P: "Permiso",
        F: "Feriado",
      }[String(code || "").toLocaleUpperCase("es-CL")] || "";
    }

    function clearCommentDraft() {
      state.commentStatusCode = "";
      state.commentDraftEmployeeIndex = null;
      state.commentDraftDateIso = "";
      const hint = $("commentHint");
      if (hint) {
        hint.hidden = true;
        hint.textContent = "";
      }
      $("commentCompose")?.classList.remove("is-linked");
      $("commentDetail")?.removeAttribute("data-autofill");
    }

    function renderCommentDraftHint(month) {
      const hint = $("commentHint");
      const compose = $("commentCompose");
      if (!hint || !compose) return;
      const hasDraft =
        state.commentStatusCode &&
        state.commentDraftEmployeeIndex !== null &&
        dateInsidePeriod(state.commentDraftDateIso, month);
      if (!hasDraft) {
        hint.hidden = true;
        compose.classList.remove("is-linked");
        return;
      }
      const employee = month.employees[state.commentDraftEmployeeIndex];
      const statusLabel = STATUS_META[state.commentStatusCode]?.label || statusCommentDetail(state.commentStatusCode);
      hint.textContent =
        "Detectado desde asistencia: " +
        formatDate(state.commentDraftDateIso, state.commentDraftDateIso) +
        " · " +
        (employee?.name || "Sin persona") +
        " · " +
        statusLabel;
      hint.hidden = false;
      compose.classList.add("is-linked");
    }

    function prefillCommentFromAttendance(employeeIndex, dayIndex, code) {
      const period = buildCutoffPeriod();
      const employee = period.employees[Number(employeeIndex)];
      const day = period.days[Number(dayIndex)];
      const cleanCode = STATUS_META[code] ? code : "EMPTY";
      if (!employee || !day || !statusNeedsComment(cleanCode)) {
        clearCommentDraft();
        return;
      }
      state.commentStatusCode = cleanCode;
      state.commentDraftEmployeeIndex = Number(employeeIndex);
      state.commentDraftDateIso = day.dateIso || defaultCommentDate(period);
      state.commentQuery = "";
      state.commentPerson = "all";
      state.commentsCollapsed = false;
      $("commentDate").value = state.commentDraftDateIso;
      $("commentPerson").value = String(employeeIndex);
      $("commentSearch").value = "";
      $("commentFilter").value = "all";
      if (!$("commentDetail").value.trim() || $("commentDetail").dataset.autofill === "1") {
        $("commentDetail").value = statusCommentDetail(cleanCode);
        $("commentDetail").dataset.autofill = "1";
      }
      renderCommentDraftHint(period);
      $("commentDetail").focus();
      $("commentDetail").select();
    }

    function buildCutoffPeriod(monthIndex = state.monthIndex) {
      normalizeReportDays();
      const target = report.months[monthIndex];
      const targetMonthIndex = inferMonthIndex(target);
      if (!target || targetMonthIndex < 0) return target;
      const targetYear = inferMonthYear(target);
      const days = buildCutoffDays(targetYear, targetMonthIndex);
      const startIso = dateIso(new Date(targetYear, targetMonthIndex - 1, CUTOFF_DAY + 1));
      const endIso = dateIso(new Date(targetYear, targetMonthIndex, CUTOFF_DAY));
      const employeesByName = new Map();
      days.forEach((day) => {
        const sourceMonth = report.months[day.sourceMonthIndex];
        if (!sourceMonth) return;
        activeEmployees(sourceMonth).forEach((employee) => {
          const key = employeeKey(employee);
          if (!employeesByName.has(key)) employeesByName.set(key, employee);
        });
      });
      if (!employeesByName.size) {
        activeEmployees(target).forEach((employee) => employeesByName.set(employeeKey(employee), employee));
      }
      const employees = [...employeesByName.values()].map((employee) => ({
        role: employee.role,
        name: employee.name,
        company: employee.company || "",
        statuses: days.map((day) => {
          const sourceMonth = report.months[day.sourceMonthIndex];
          const sourceEmployee = sourceMonth ? sourceMonth.employees[findEmployeeIndex(sourceMonth, employee)] : null;
          return normalizeStatusForDay(day, sourceEmployee?.statuses?.[day.sourceDayIndex]);
        }),
        summary: {},
      }));
      const period = {
        id: "corte-" + target.id,
        isCutoffPeriod: true,
        sourceMonthIndex: monthIndex,
        title: "Corte " + target.title,
        sheetName: "CORTE " + target.title.toLocaleUpperCase("es-CL"),
        periodLabel: formatDate(startIso, startIso) + " al " + formatDate(endIso, endIso),
        periodStartIso: startIso,
        periodEndIso: endIso,
        days,
        employees,
        comments: commentsForPeriod(startIso, endIso, monthIndex),
        totals: {},
      };
      recalcMonth(period);
      return period;
    }

    function activeEmployees(month) {
      return (month.employees || []).filter((employee) => employee.name);
    }

    function filteredEmployees(month) {
      const query = state.query.trim().toLocaleUpperCase("es-CL");
      return activeEmployees(month).filter((employee) => {
        const haystack = (employee.name + " " + employee.role).toLocaleUpperCase("es-CL");
        const matchesQuery = !query || haystack.includes(query);
        const matchesStatus = state.status === "all" || employee.statuses.some((status) => status.code === state.status);
        const rate = employee.summary.attendanceRate;
        const matchesRate =
          state.rate === "all" ||
          (state.rate === "low" && rate !== null && rate < 0.95) ||
          (state.rate === "perfect" && rate === 1);
        return matchesQuery && matchesStatus && matchesRate;
      });
    }

    function renderMeta() {
      const sourceDate = report.sourceLastModified ? dateFmt.format(new Date(report.sourceLastModified)) : "";
      $("sourceMeta").textContent = "Fuente: " + report.sourceFile + (sourceDate ? " · actualizado " + sourceDate : "");
    }

    function renderTabs() {
      $("monthTabs").innerHTML = report.months.map((month, index) => {
        const period = buildCutoffPeriod(index);
        return (
        '<button class="month-tab" type="button" data-month="' + index + '" aria-selected="' + (index === state.monthIndex) + '">' +
          escapeHtml(month.title) + '<small>Corte 25 · ' + escapeHtml(percent(period.totals.attendanceRate)) + '</small>' +
        "</button>"
        );
      }).join("");
    }

    function renderEditor(month) {
      const selectedEmployee = $("editEmployee").value;
      const selectedDay = $("editDay").value;
      const active = month.employees
        .map((employee, index) => ({ employee, index }))
        .filter(({ employee }) => employee.name);
      const employeeOptions = active.map(({ employee, index }) =>
        '<option value="' + index + '">' + escapeHtml(employee.name + " · " + (employee.role || "-")) + '</option>'
      ).join("");
      const dayOptions = month.days.map((day, index) =>
        '<option value="' + index + '">' + escapeHtml((day.label || day.day) + " · " + day.weekday) + '</option>'
      ).join("");

      $("editEmployee").innerHTML = employeeOptions;
      $("commentPerson").innerHTML = employeeOptions;
      $("commentFilter").innerHTML = '<option value="all">Todos</option>' + active.map(({ employee }) =>
        '<option value="' + escapeHtml(employee.name) + '">' + escapeHtml(employee.name) + '</option>'
      ).join("");
      $("editDay").innerHTML = dayOptions;
      if (state.selectedEmployeeIndex !== null && month.employees[state.selectedEmployeeIndex]) $("editEmployee").value = state.selectedEmployeeIndex;
      else if (selectedEmployee && month.employees[selectedEmployee]) $("editEmployee").value = selectedEmployee;
      if (state.selectedDayIndex !== null && month.days[state.selectedDayIndex]) $("editDay").value = state.selectedDayIndex;
      else if (selectedDay && month.days[selectedDay]) $("editDay").value = selectedDay;
      const selectedStatus = month.employees[state.selectedEmployeeIndex]?.statuses?.[state.selectedDayIndex]?.code;
      if (selectedStatus && $("editStatus").querySelector('option[value="' + selectedStatus + '"]')) $("editStatus").value = selectedStatus;
      $("commentFilter").value = state.commentPerson;
      if (month.periodStartIso && month.periodEndIso) {
        $("commentDate").min = month.periodStartIso;
        $("commentDate").max = month.periodEndIso;
        $("commentDate").value = defaultCommentDate(month);
      } else if (!$("commentDate").value) {
        $("commentDate").value = new Date(report.sourceLastModified || Date.now()).toISOString().slice(0, 10);
      }
      if (state.commentDraftEmployeeIndex !== null && month.employees[state.commentDraftEmployeeIndex]) $("commentPerson").value = state.commentDraftEmployeeIndex;
      if (state.commentDraftDateIso && dateInsidePeriod(state.commentDraftDateIso, month)) $("commentDate").value = state.commentDraftDateIso;
      renderCommentDraftHint(month);
      if (!$("newMonth").value) $("newMonth").value = defaultMonthValue();
    }

    function renderKpis(month) {
      const totals = month.totals;
      const employees = activeEmployees(month).length;
      const incidents = (totals.absent || 0) + (totals.permission || 0) + (totals.medical || 0);
      $("kpis").innerHTML = [
        [month.isCutoffPeriod ? "Corte RRHH" : "Mes", month.title, (month.periodLabel || month.days.length + " días en planilla")],
        ["Asistencia", percent(totals.attendanceRate), moneyless.format(totals.workDays || 0) + " días controlados"],
        ["Trabajadores", moneyless.format(employees), "con registros activos"],
        ["Ausencias", moneyless.format(totals.absent || 0), moneyless.format(totals.absenceDays || 0) + " días de ausencia"],
        ["Vacaciones", moneyless.format(totals.vacation || 0), "días marcados con V"],
        ["Incidencias", moneyless.format(incidents), "ausencias, permisos y licencias"],
      ].map(([label, value, note], index) => (
        '<article class="kpi kpi-' + ["month", "attendance", "people", "absences", "vacation", "incidents"][index] + '"><span>' + escapeHtml(label) + '</span><strong>' + escapeHtml(value) + '</strong><small>' + escapeHtml(note) + '</small></article>'
      )).join("");
    }

    function renderPeople(month, employees) {
      $("peopleSubtitle").textContent = employees.length + " trabajadores visibles";
      if (!employees.length) {
        $("peopleTable").innerHTML = '<tbody><tr><td class="empty-state">No hay registros con esos filtros.</td></tr></tbody>';
        return;
      }

      $("peopleTable").innerHTML = '<thead><tr>' +
        '<th>Trabajador</th><th>Cargo</th><th class="num">Asiste</th><th class="num">Ausente</th><th class="num">Vac.</th><th class="num">Lic.</th><th class="num">Perm.</th><th class="num">Trabajo</th><th class="num">% Asistencia</th>' +
        '</tr></thead><tbody>' +
        employees.map((employee) => {
          const rate = employee.summary.attendanceRate;
          const low = rate !== null && rate < 0.95 ? " low" : "";
          const rowClass = rate !== null && rate < 0.95 ? "row-low" : "";
          return '<tr class="' + rowClass + '">' +
            '<td><span class="person-cell"><span class="avatar">' + escapeHtml(initials(employee.name)) + '</span><span><span class="person-name">' + escapeHtml(employee.name) + '</span></span></span></td>' +
            '<td><span class="role-badge">' + escapeHtml(employee.role || "-") + '</span></td>' +
            '<td class="num">' + countPill(employee.summary.present, "good") + '</td>' +
            '<td class="num">' + countPill(employee.summary.absent, "bad") + '</td>' +
            '<td class="num">' + countPill(employee.summary.vacation, "vacation") + '</td>' +
            '<td class="num">' + countPill(employee.summary.medical, "medical") + '</td>' +
            '<td class="num">' + countPill(employee.summary.permission, "permission") + '</td>' +
            '<td class="num">' + moneyless.format(employee.summary.workDays || 0) + '</td>' +
            '<td class="num"><span class="rate' + low + '">' + escapeHtml(percent(rate)) + '<span class="meter"><i style="width:' + Math.max(0, Math.min(100, Number(rate || 0) * 100)) + '%"></i></span></span></td>' +
          '</tr>';
        }).join("") +
        '</tbody>';
    }

    function renderDaily(month, employees) {
      $("dailySubtitle").textContent = (month.periodLabel ? month.periodLabel + " · " : "") + month.days.length + " días y " + employees.length + " trabajadores visibles";
      if (!employees.length) {
        $("dailyTable").innerHTML = '<tbody><tr><td class="empty-state">No hay calendario para mostrar.</td></tr></tbody>';
        return;
      }
      $("dailyTable").innerHTML = '<thead><tr><th class="sticky-name">Trabajador</th>' +
        month.days.map((day) => '<th class="' + weekendClass(day).trim() + '"><span class="day-label">' + escapeHtml(day.label || day.day) + '<small>' + escapeHtml(day.weekday) + '</small></span></th>').join("") +
        '</tr></thead><tbody>' +
        employees.map((employee) => (
          '<tr><td class="sticky-name"><span class="person-cell"><span class="avatar" data-worker-filter="1" data-worker-name="' + escapeHtml(employee.name) + '" title="Ver comentarios de ' + escapeHtml(employee.name) + '">' + escapeHtml(initials(employee.name)) + '</span><span><span class="person-name">' + escapeHtml(employee.name) + '</span><span class="role">' + escapeHtml(employee.role || "") + '</span></span></span></td>' +
          employee.statuses.map((status, dayIndex) => {
            const text = status.code === "EMPTY" ? "." : (status.code === "OTHER" || status.code === "OUT" ? status.label : status.code);
            const title = status.raw || status.label;
            const employeeIndex = month.employees.indexOf(employee);
            const selected = employeeIndex === state.selectedEmployeeIndex && dayIndex === state.selectedDayIndex ? " selected" : "";
            return '<td class="' + weekendClass(status).trim() + '"><button type="button" class="status ' + escapeHtml(status.className) + selected + '" data-status-cell="1" data-employee="' + employeeIndex + '" data-day="' + dayIndex + '" title="' + escapeHtml(title || "Vacío") + '">' + escapeHtml(text) + '</button></td>';
          }).join("") + '</tr>'
        )).join("") +
        '</tbody>';
    }

    function renderLegend() {
      const items = [
        ["X", "Asiste", "present"],
        ["T", "Atraso", "late"],
        ["A", "Ausente", "absent"],
        ["V", "Vacaciones", "vacation"],
        ["L", "Licencia", "medical"],
        ["P", "Permiso", "permission"],
        ["F", "Feriado", "holiday"],
      ];
      $("legend").innerHTML = items.map(([code, label, className]) => (
        '<span class="legend-item"><span class="status ' + className + '">' + code + '</span>' + escapeHtml(label) + '</span>'
      )).join("");
    }

    function renderBars() {
      $("monthlyBars").innerHTML = report.months.map((month, index) => {
        const period = buildCutoffPeriod(index);
        const rate = Number(period.totals.attendanceRate || 0);
        const active = index === state.monthIndex ? " is-active" : "";
        return '<div class="bar-row' + active + '">' +
          '<strong>' + escapeHtml(month.title.slice(0, 9)) + '</strong>' +
          '<span class="bar-track"><i style="width:' + Math.max(0, Math.min(100, rate * 100)) + '%"></i></span>' +
          '<span class="num">' + escapeHtml(percent(rate)) + '</span>' +
        '</div>';
      }).join("");
    }

    function renderAlerts(month) {
      const alerts = activeEmployees(month)
        .filter((employee) => employee.summary.attendanceRate !== null && employee.summary.attendanceRate < 0.95)
        .sort((a, b) => a.summary.attendanceRate - b.summary.attendanceRate)
        .slice(0, 8);
      if (!alerts.length) {
        $("alerts").innerHTML = '<div class="empty-state">Sin trabajadores bajo 95% en este corte.</div>';
        return;
      }
      $("alerts").innerHTML = alerts.map((employee) => {
        const severity = employee.summary.attendanceRate < 0.9 ? " high" : " watch";
        return '<div class="alert-item' + severity + '"><strong>' + escapeHtml(employee.name) + '</strong><span>' +
        escapeHtml(percent(employee.summary.attendanceRate)) + ' &middot; ' +
        moneyless.format(employee.summary.absenceDays || employee.summary.absent || 0) + ' días de ausencia</span></div>';
      }).join("");
    }

    function commentMatchesPerson(comment, person) {
      if (person === "all") return true;
      const commentPerson = normalizeText(comment.person || "");
      const selectedPerson = normalizeText(person || "");
      return !!commentPerson && !!selectedPerson && (
        commentPerson === selectedPerson ||
        selectedPerson.includes(commentPerson) ||
        commentPerson.includes(selectedPerson)
      );
    }

    function renderComments(month) {
      const query = normalizeText(state.commentQuery);
      const filteredComments = month.comments.filter((comment) => {
        const matchesPerson = commentMatchesPerson(comment, state.commentPerson);
        const matchesQuery = !query || normalizeText(comment.person + " " + comment.detail + " " + formatDate(comment.dateRaw, comment.dateIso)).includes(query);
        return matchesPerson && matchesQuery;
      });
      const counts = month.comments.reduce((acc, comment) => {
        acc[commentKind(comment)] = (acc[commentKind(comment)] || 0) + 1;
        return acc;
      }, {});
      $("commentsSubtitle").textContent = filteredComments.length + " de " + month.comments.length + " registros";
      $("commentsPanel").classList.toggle("is-collapsed", state.commentsCollapsed);
      $("commentsBody").hidden = state.commentsCollapsed;
      $("toggleComments").textContent = state.commentsCollapsed ? "Mostrar" : "Contraer";
      $("toggleComments").setAttribute("aria-expanded", String(!state.commentsCollapsed));
      $("commentsSummary").innerHTML = [
        [counts.absence || 0, "Faltas"],
        [counts.late || 0, "Atrasos"],
        [counts.permission || 0, "Permisos"],
      ].map(([value, label]) => (
        '<div class="comment-stat"><strong>' + moneyless.format(value) + '</strong><span>' + escapeHtml(label) + '</span></div>'
      )).join("");
      if (!filteredComments.length) {
        $("comments").innerHTML = '<div class="empty-state">Sin comentarios registrados.</div>';
        return;
      }
      $("comments").innerHTML = filteredComments.map((comment) => (
        '<div class="comment-item ' + commentKind(comment) + '"><div class="comment-top"><span class="comment-person"><strong>' + escapeHtml(comment.person || "Sin persona") + '</strong><span class="comment-meta"><span class="type-chip">' + escapeHtml(commentKindLabel(comment)) + '</span><span class="date-chip">' + escapeHtml(formatDate(comment.dateRaw, comment.dateIso)) + '</span></span></span>' +
        '<span class="comment-badges"><button class="comment-delete" type="button" data-delete-comment="1" data-month="' + escapeHtml(comment.sourceMonthIndex) + '" data-comment="' + escapeHtml(comment.sourceCommentIndex) + '" title="Eliminar comentario" aria-label="Eliminar comentario"></button></span></div>' +
        '<span class="comment-detail">' + escapeHtml(comment.detail || "Sin detalle") + '</span></div>'
      )).join("");
    }

    function deleteComment(monthIndex, commentIndex) {
      const month = report.months[Number(monthIndex)];
      if (!month || !Array.isArray(month.comments) || !month.comments[Number(commentIndex)]) return;
      const comment = month.comments[Number(commentIndex)];
      if (!confirm("Eliminar este comentario de " + (comment.person || "sin persona") + "?")) return;
      month.comments.splice(Number(commentIndex), 1);
      state.commentQuery = "";
      state.commentPerson = "all";
      $("commentSearch").value = "";
      $("commentFilter").value = "all";
      markSavedSoon();
      render();
    }

    function renderWorkers(month) {
      const selected = $("deleteWorkerSelect")?.value || "";
      const workers = activeEmployees(month);
      $("workersSubtitle").textContent = moneyless.format(workers.length) + " registrados en este corte";
      $("workersPanel").classList.toggle("is-collapsed", state.workersCollapsed);
      $("workerTools").hidden = state.workersCollapsed;
      $("toggleWorkers").textContent = state.workersCollapsed ? "Mostrar" : "Contraer";
      $("toggleWorkers").setAttribute("aria-expanded", String(!state.workersCollapsed));
      $("deleteWorkerSelect").innerHTML = workers.length
        ? workers.map((employee) => (
          '<option value="' + escapeHtml(employeeKey(employee)) + '">' +
          escapeHtml(employee.name + (employee.role ? " · " + employee.role : "")) +
          '</option>'
        )).join("")
        : '<option value="">Sin trabajadores</option>';
      if (selected && workers.some((employee) => employeeKey(employee) === selected)) {
        $("deleteWorkerSelect").value = selected;
      }
      $("deleteWorker").disabled = !workers.length;
    }

    function setAttendance(employeeIndex, dayIndex, code) {
      const period = buildCutoffPeriod();
      const employee = period.employees[Number(employeeIndex)];
      const day = period.days[Number(dayIndex)];
      const sourceMonth = report.months[day?.sourceMonthIndex];
      if (!employee || !day || !sourceMonth || day.sourceDayIndex < 0) return;
      const sourceEmployeeIndex = ensureSourceEmployee(sourceMonth, employee);
      const sourceEmployee = sourceMonth.employees[sourceEmployeeIndex];
      state.selectedEmployeeIndex = Number(employeeIndex);
      state.selectedDayIndex = Number(dayIndex);
      sourceEmployee.statuses[day.sourceDayIndex] = statusFor(sourceMonth.days[day.sourceDayIndex], code);
      recalcMonth(sourceMonth);
      recalcMonth(report.months[state.monthIndex]);
      markSavedSoon();
      render();
      prefillCommentFromAttendance(employeeIndex, dayIndex, code);
    }

    function cycleAttendance(employeeIndex, dayIndex) {
      const period = buildCutoffPeriod();
      const current = period.employees[Number(employeeIndex)]?.statuses[Number(dayIndex)]?.code || "EMPTY";
      const next = STATUS_CYCLE[(Math.max(0, STATUS_CYCLE.indexOf(current)) + 1) % STATUS_CYCLE.length];
      setAttendance(employeeIndex, dayIndex, next);
    }

    function addComment() {
      const period = buildCutoffPeriod();
      const personIndex = Number($("commentPerson").value);
      const person = period.employees[personIndex]?.name || "";
      const detail = $("commentDetail").value.trim();
      const dateIso = dateInsidePeriod($("commentDate").value, period) ? $("commentDate").value : defaultCommentDate(period);
      if (!person || !detail) return;
      const sourceMonth = sourceMonthForComment(dateIso);
      sourceMonth.comments = sourceMonth.comments || [];
      sourceMonth.comments.push({
        dateRaw: dateIso || "Sin fecha",
        dateIso: dateIso || null,
        person,
        detail,
        statusCode: state.commentStatusCode || "",
      });
      state.commentQuery = "";
      state.commentPerson = "all";
      state.commentStatusCode = "";
      state.commentDraftEmployeeIndex = null;
      state.commentDraftDateIso = "";
      $("commentDate").value = dateIso;
      $("commentDetail").value = "";
      $("commentDetail").removeAttribute("data-autofill");
      $("commentSearch").value = "";
      $("commentFilter").value = "all";
      markSavedSoon();
      render();
    }

    function addWorker() {
      const name = cleanWorkerText($("workerName").value);
      const role = cleanWorkerText($("workerRole").value || "OPERARIO");
      if (!name) {
        setWorkerMessage("Ingresa el nombre del trabajador.");
        return;
      }
      const exists = report.months.some((month) =>
        (month.employees || []).some((employee) => employeeKey(employee) === normalizeText(name))
      );
      if (exists) {
        setWorkerMessage("Ese trabajador ya existe.");
        return;
      }
      report.months.forEach((month, index) => {
        if (index < state.monthIndex) return;
        month.employees = month.employees || [];
        month.employees.push(createEmptyEmployee(month, name, role));
        recalcMonth(month);
      });
      state.query = "";
      state.status = "all";
      state.rate = "all";
      $("searchInput").value = "";
      $("statusFilter").value = "all";
      $("rateFilter").value = "all";
      $("workerName").value = "";
      $("workerRole").value = "";
      markSavedSoon();
      render();
      setWorkerMessage("Trabajador agregado.");
    }

    function deleteWorker() {
      const key = $("deleteWorkerSelect").value;
      if (!key) return;
      const period = buildCutoffPeriod();
      const employee = activeEmployees(period).find((candidate) => employeeKey(candidate) === key);
      const name = employee?.name || "este trabajador";
      if (!confirm("Eliminar " + name + " de la asistencia? Sus comentarios se conservaran.")) return;
      report.months.forEach((month) => {
        month.employees = (month.employees || []).filter((candidate) => employeeKey(candidate) !== key);
        recalcMonth(month);
      });
      state.selectedEmployeeIndex = null;
      state.selectedDayIndex = null;
      clearCommentDraft();
      markSavedSoon();
      render();
      setWorkerMessage("Trabajador eliminado.");
    }

    function addMonth() {
      const value = $("newMonth").value || defaultMonthValue();
      $("newMonth").value = value;
      if (!value) {
        const saveState = $("saveState");
        if (saveState) {
          saveState.textContent = "Elige un mes";
          saveState.classList.add("pending");
        }
        return;
      }
      const [year, monthNumber] = value.split("-").map(Number);
      const monthIndex = monthNumber - 1;
      const existingIndex = findMonthByYearMonth(year, monthIndex);
      if (existingIndex >= 0) {
        state.monthIndex = existingIndex;
        state.query = "";
        state.status = "all";
        state.rate = "all";
        state.commentQuery = "";
        state.commentPerson = "all";
        state.commentStatusCode = "";
        state.commentDraftEmployeeIndex = null;
        state.commentDraftDateIso = "";
        state.selectedEmployeeIndex = null;
        state.selectedDayIndex = null;
        $("searchInput").value = "";
        $("statusFilter").value = "all";
        $("rateFilter").value = "all";
        $("commentSearch").value = "";
        $("commentFilter").value = "all";
        $("newMonth").value = defaultMonthValue();
        render();
        const saveState = $("saveState");
        if (saveState) {
          saveState.textContent = "Mes ya existe";
          saveState.classList.remove("pending");
        }
        return;
      }
      const days = buildMonthDays(year, monthIndex);
      let title = MONTH_NAMES[monthIndex];
      if (report.months.some((month) => month.title === title)) title = title + " " + year;
      const sourceEmployees = activeEmployees(sourceMonthForNewMonth());
      const month = {
        id: title.toLocaleLowerCase("es-CL").replace(/[^a-z0-9]+/g, "-"),
        sheetName: title.toLocaleUpperCase("es-CL"),
        title,
        year,
        days,
        employees: sourceEmployees.map((employee) => ({
          role: employee.role,
          name: employee.name,
          company: employee.company || "",
          statuses: days.map((day) => statusFor(day, "EMPTY")),
          summary: {
            holidays: 0,
            present: 0,
            absent: 0,
            vacation: 0,
            medical: 0,
            permission: 0,
            absenceDays: 0,
            workDays: 0,
            attendanceRate: null,
          },
        })),
        comments: [],
        totals: {
          holidays: 0,
          present: 0,
          absent: 0,
          vacation: 0,
          medical: 0,
          permission: 0,
          absenceDays: 0,
          workDays: 0,
          attendanceRate: null,
        },
      };
      recalcMonth(month);
      report.months.push(month);
      state.monthIndex = report.months.length - 1;
      state.query = "";
      state.status = "all";
      state.rate = "all";
      state.commentQuery = "";
      state.commentPerson = "all";
      state.commentStatusCode = "";
      state.commentDraftEmployeeIndex = null;
      state.commentDraftDateIso = "";
      state.selectedEmployeeIndex = null;
      state.selectedDayIndex = null;
      $("searchInput").value = "";
      $("statusFilter").value = "all";
      $("rateFilter").value = "all";
      $("commentSearch").value = "";
      $("commentFilter").value = "all";
      $("newMonth").value = defaultMonthValue();
      markSavedSoon();
      render();
    }

    function xmlEscape(value) {
      return String(value ?? "").replace(/[<>&"]/g, (char) => ({
        "<": "&lt;",
        ">": "&gt;",
        "&": "&amp;",
        '"': "&quot;",
      }[char]));
    }

    function safeFileName(value) {
      return String(value || "mes")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^a-zA-Z0-9]+/g, "_")
        .replace(/^_+|_+$/g, "");
    }

    function excelCell(value, style = "Text", type = null) {
      const attrs = style ? ' ss:StyleID="' + style + '"' : "";
      const isNumber = typeof value === "number" && Number.isFinite(value);
      const dataType = type || (isNumber ? "Number" : "String");
      const dataValue = isNumber ? String(value) : xmlEscape(value ?? "");
      return '<Cell' + attrs + '><Data ss:Type="' + dataType + '">' + dataValue + '</Data></Cell>';
    }

    function excelRow(cells, style = null) {
      return "<Row>" + cells.map((cell) => {
        if (cell && typeof cell === "object" && !Array.isArray(cell)) {
          return excelCell(cell.value, cell.style || style || "Text", cell.type || null);
        }
        return excelCell(cell, style || "Text");
      }).join("") + "</Row>";
    }

    function statusStyle(code) {
      return {
        X: "Present",
        T: "Late",
        A: "Absent",
        V: "Vacation",
        L: "Medical",
        P: "Permission",
        F: "Holiday",
        EMPTY: "Blank",
      }[code] || "Other";
    }

    function buildExcelWorkbook(month) {
      if (!month.isCutoffPeriod) normalizeMonthDays(month);
      recalcMonth(month);
      const employees = activeEmployees(month);
      const generated = new Date().toLocaleString("es-CL");
      const commentStats = month.comments.reduce((acc, comment) => {
        const kind = commentKind(comment);
        acc[kind] = (acc[kind] || 0) + 1;
        return acc;
      }, {});
      const summaryHeader = ["Cargo", "Trabajador", "Asiste", "Ausente", "Vacaciones", "Licencia", "Permiso", "Días ausencia", "Días trabajo", "% asistencia"];
      const summaryRows = [
        excelRow(["Asistencia Novapet"], "Title"),
        excelRow([month.isCutoffPeriod ? "Periodo RRHH" : "Mes", month.title, "Rango", month.periodLabel || month.title, "Exportado", generated], "Subtitle"),
        excelRow([]),
        excelRow(["Indicador", "Valor"], "Header"),
        excelRow(["Trabajadores", employees.length]),
        excelRow(["Asistencia", { value: month.totals.attendanceRate ?? 0, style: "Percent", type: "Number" }]),
        excelRow(["Asiste", month.totals.present || 0]),
        excelRow(["Ausente", month.totals.absent || 0]),
        excelRow(["Vacaciones", month.totals.vacation || 0]),
        excelRow(["Licencia", month.totals.medical || 0]),
        excelRow(["Permiso", month.totals.permission || 0]),
        excelRow(["Días ausencia", month.totals.absenceDays || 0]),
        excelRow(["Días trabajo", month.totals.workDays || 0]),
        excelRow(["Comentarios RRHH", month.comments.length]),
        excelRow(["Comentarios faltas/ausencias", commentStats.absence || 0]),
        excelRow(["Comentarios atrasos", commentStats.late || 0]),
        excelRow(["Comentarios permisos/retiros", commentStats.permission || 0]),
        excelRow([]),
        excelRow(summaryHeader, "Header"),
        ...employees.map((employee) => excelRow([
          employee.role || "",
          employee.name || "",
          employee.summary.present || 0,
          employee.summary.absent || 0,
          employee.summary.vacation || 0,
          employee.summary.medical || 0,
          employee.summary.permission || 0,
          employee.summary.absenceDays || 0,
          employee.summary.workDays || 0,
          { value: employee.summary.attendanceRate ?? 0, style: "Percent", type: "Number" },
        ])),
        excelRow([
          "TOTAL",
          "",
          month.totals.present || 0,
          month.totals.absent || 0,
          month.totals.vacation || 0,
          month.totals.medical || 0,
          month.totals.permission || 0,
          month.totals.absenceDays || 0,
          month.totals.workDays || 0,
          { value: month.totals.attendanceRate ?? 0, style: "PercentTotal", type: "Number" },
        ], "Total"),
      ].join("");

      const dayHeaders = month.days.map((day) => (day.label || day.day) + " " + day.weekday);
      const calendarRows = [
        excelRow(["Calendario de asistencia", month.title, month.periodLabel || ""], "Title"),
        excelRow(["Leyenda", "X Asiste", "T Atraso", "A Ausente", "V Vacaciones", "L Licencia", "P Permiso", "F Feriado"], "Subtitle"),
        excelRow([]),
        excelRow(["Cargo", "Trabajador", ...dayHeaders, "Asiste", "Ausente", "Vac.", "Lic.", "Perm.", "Días ausencia", "Días trabajo", "% asistencia"], "Header"),
        ...employees.map((employee) => excelRow([
          employee.role || "",
          employee.name || "",
          ...employee.statuses.map((status) => ({
            value: status.code === "EMPTY" ? "" : status.code,
            style: statusStyle(status.code),
          })),
          employee.summary.present || 0,
          employee.summary.absent || 0,
          employee.summary.vacation || 0,
          employee.summary.medical || 0,
          employee.summary.permission || 0,
          employee.summary.absenceDays || 0,
          employee.summary.workDays || 0,
          { value: employee.summary.attendanceRate ?? 0, style: "Percent", type: "Number" },
        ])),
      ].join("");

      const commentRows = [
        excelRow(["Comentarios para RRHH", month.title, month.periodLabel || ""], "Title"),
        excelRow(["Total comentarios", month.comments.length, "Exportado", generated], "Subtitle"),
        excelRow([]),
        excelRow(["Fecha", "Trabajador", "Tipo", "Detalle"], "Header"),
        ...(month.comments.length ? month.comments.map((comment) => excelRow([
          formatDate(comment.dateRaw, comment.dateIso),
          comment.person || "",
          commentKindLabel(comment),
          { value: comment.detail || "", style: "LongText" },
        ])) : [excelRow(["Sin comentarios", "", "", ""])]),
      ].join("");

      return '<?xml version="1.0"?>' +
        '<?mso-application progid="Excel.Sheet"?>' +
        '<Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet" ' +
        'xmlns:o="urn:schemas-microsoft-com:office:office" ' +
        'xmlns:x="urn:schemas-microsoft-com:office:excel" ' +
        'xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet">' +
        '<Styles>' +
        '<Style ss:ID="Default" ss:Name="Normal"><Alignment ss:Vertical="Center"/><Font ss:FontName="Calibri" ss:Size="11"/><Borders><Border ss:Position="Bottom" ss:LineStyle="Continuous" ss:Weight="1" ss:Color="#D9E2E2"/></Borders></Style>' +
        '<Style ss:ID="Title"><Font ss:Bold="1" ss:Size="18" ss:Color="#17272B"/><Interior ss:Color="#FFFFFF" ss:Pattern="Solid"/></Style>' +
        '<Style ss:ID="Subtitle"><Font ss:Color="#4D6268"/><Interior ss:Color="#F6F8F8" ss:Pattern="Solid"/></Style>' +
        '<Style ss:ID="Header"><Font ss:Bold="1" ss:Color="#17272B"/><Interior ss:Color="#EAF2F1" ss:Pattern="Solid"/><Alignment ss:Horizontal="Center" ss:Vertical="Center"/></Style>' +
        '<Style ss:ID="Text"><Alignment ss:Vertical="Center"/></Style>' +
        '<Style ss:ID="LongText"><Alignment ss:Vertical="Top" ss:WrapText="1"/></Style>' +
        '<Style ss:ID="Total"><Font ss:Bold="1"/><Interior ss:Color="#F1F6F5" ss:Pattern="Solid"/></Style>' +
        '<Style ss:ID="Percent"><NumberFormat ss:Format="0.0%"/><Alignment ss:Horizontal="Right"/></Style>' +
        '<Style ss:ID="PercentTotal"><Font ss:Bold="1"/><NumberFormat ss:Format="0.0%"/><Interior ss:Color="#F1F6F5" ss:Pattern="Solid"/><Alignment ss:Horizontal="Right"/></Style>' +
        '<Style ss:ID="Present"><Font ss:Bold="1" ss:Color="#26734D"/><Interior ss:Color="#EDF8F2" ss:Pattern="Solid"/><Alignment ss:Horizontal="Center"/></Style>' +
        '<Style ss:ID="Late"><Font ss:Bold="1" ss:Color="#A96F15"/><Interior ss:Color="#FFF7E2" ss:Pattern="Solid"/><Alignment ss:Horizontal="Center"/></Style>' +
        '<Style ss:ID="Absent"><Font ss:Bold="1" ss:Color="#B94038"/><Interior ss:Color="#FFF0EE" ss:Pattern="Solid"/><Alignment ss:Horizontal="Center"/></Style>' +
        '<Style ss:ID="Vacation"><Font ss:Bold="1" ss:Color="#2F5F9F"/><Interior ss:Color="#EEF5FF" ss:Pattern="Solid"/><Alignment ss:Horizontal="Center"/></Style>' +
        '<Style ss:ID="Medical"><Font ss:Bold="1" ss:Color="#6D57A4"/><Interior ss:Color="#F3EFFF" ss:Pattern="Solid"/><Alignment ss:Horizontal="Center"/></Style>' +
        '<Style ss:ID="Permission"><Font ss:Bold="1" ss:Color="#A96F15"/><Interior ss:Color="#FFF7E2" ss:Pattern="Solid"/><Alignment ss:Horizontal="Center"/></Style>' +
        '<Style ss:ID="Holiday"><Font ss:Bold="1" ss:Color="#667085"/><Interior ss:Color="#EEF1F3" ss:Pattern="Solid"/><Alignment ss:Horizontal="Center"/></Style>' +
        '<Style ss:ID="Blank"><Interior ss:Color="#FFFFFF" ss:Pattern="Solid"/></Style>' +
        '<Style ss:ID="Other"><Interior ss:Color="#F3F4F6" ss:Pattern="Solid"/><Alignment ss:Horizontal="Center"/></Style>' +
        '</Styles>' +
        '<Worksheet ss:Name="Resumen"><Table><Column ss:Width="110"/><Column ss:Width="180"/><Column ss:Width="82" ss:Span="8"/>' + summaryRows + '</Table></Worksheet>' +
        '<Worksheet ss:Name="Calendario"><Table><Column ss:Width="110"/><Column ss:Width="180"/><Column ss:Width="34" ss:Span="' + Math.max(1, month.days.length - 1) + '"/><Column ss:Width="72" ss:Span="7"/>' + calendarRows + '</Table></Worksheet>' +
        '<Worksheet ss:Name="Comentarios"><Table><Column ss:Width="100"/><Column ss:Width="160"/><Column ss:Width="120"/><Column ss:Width="480"/>' + commentRows + '</Table></Worksheet>' +
        '</Workbook>';
    }

    function exportCurrentMonth() {
      normalizeReportDays();
      report.months.forEach(recalcMonth);
      persist();
      const month = buildCutoffPeriod();
      const workbook = buildExcelWorkbook(month);
      const blob = new Blob([workbook], { type: "application/vnd.ms-excel;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "Asistencia_Novapet_" + safeFileName(month.title + "_" + (month.periodEndIso || "")) + "_RRHH.xls";
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

      const month = buildCutoffPeriod();
      const employees = filteredEmployees(month);
      renderTabs();
      renderEditor(month);
      renderKpis(month);
      renderPeople(month, employees);
      renderDaily(month, employees);
      renderLegend();
      renderBars();
      renderAlerts(month);
      renderComments(month);
      renderWorkers(month);
    }

      cycleAttendance(cell.dataset.employee, cell.dataset.day);
    });
    $("addComment").addEventListener("click", addComment);
    $("commentDetail").addEventListener("keydown", (event) => {
      if (event.key === "Enter") addComment();
    });
    $("commentDetail").addEventListener("input", () => {
      $("commentDetail").dataset.autofill = "0";
    });
    $("comments").addEventListener("click", (event) => {
      const button = event.target.closest("[data-delete-comment]");
      if (!button) return;
      deleteComment(button.dataset.month, button.dataset.comment);
    });
    $("toggleComments").addEventListener("click", () => {
      state.commentsCollapsed = !state.commentsCollapsed;
      renderComments(buildCutoffPeriod());
    });
    $("toggleWorkers").addEventListener("click", () => {
      state.workersCollapsed = !state.workersCollapsed;
      renderWorkers(buildCutoffPeriod());
    });
    $("addWorker").addEventListener("click", addWorker);
    $("deleteWorker").addEventListener("click", deleteWorker);
    $("workerName").addEventListener("keydown", (event) => {
      if (event.key === "Enter") addWorker();
    });
    $("workerRole").addEventListener("keydown", (event) => {
      if (event.key === "Enter") addWorker();
    });
    $("addMonth").addEventListener("click", addMonth);
    $("restoreData").addEventListener("click", () => {
      if (!confirm("Restaurar los datos originales del Excel?")) return;
      localStorage.removeItem(STORAGE_KEY);
      report = structuredClone(BASE_REPORT);
      normalizeReportDays();
      report.months.forEach(recalcMonth);
      state.monthIndex = Math.max(0, report.months.length - 1);
      state.query = "";
      state.status = "all";
      state.rate = "all";
      state.commentQuery = "";
      state.commentPerson = "all";
      state.commentStatusCode = "";
      state.commentDraftEmployeeIndex = null;
      state.commentDraftDateIso = "";
      state.selectedEmployeeIndex = null;
      state.selectedDayIndex = null;
      $("searchInput").value = "";
      $("statusFilter").value = "all";
      $("rateFilter").value = "all";
      $("newMonth").value = "";
      render();
      const saveState = $("saveState");
      if (saveState) saveState.textContent = "Restaurado";
    });
    $("exportFile").addEventListener("click", exportCurrentMonth);

    normalizeReportDays();
    report.months.forEach(recalcMonth);
    renderMeta();
    render();
  </script>
</body>
</html>
